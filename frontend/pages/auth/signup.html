<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuPi — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../../css/design-system.css">
  <link rel="stylesheet" href="../../css/nav.css">
  <style>
    .auth-page {
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 24px; position: relative; overflow: hidden;
    }
    .auth-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .auth-bg-blob {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.12;
    }
    .auth-bg-blob-1 {
      width: 500px; height: 500px; top: -150px; right: -100px;
      background: radial-gradient(circle, #5bc4f5, transparent);
    }
    .auth-bg-blob-2 {
      width: 400px; height: 400px; bottom: -100px; left: -100px;
      background: radial-gradient(circle, #3ddc52, transparent);
    }
    .auth-grid-overlay {
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(61,220,82,0.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(61,220,82,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .auth-card {
      position: relative; z-index: 1; width: 100%; max-width: 480px;
      background: var(--bg-surface); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl); padding: 40px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }
    .auth-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(91,196,245,0.7), transparent);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    }
    .auth-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; margin-bottom: 28px; justify-content: center;
    }
    .auth-logo-icon {
      width: 40px; height: 40px; background: var(--accent); border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-weight: 800; font-size: 1.2rem; color: var(--text-primary);
    }
    .auth-logo-text {
      font-family: var(--font-display); font-weight: 800;
      font-size: 1.4rem; color: var(--text-primary); letter-spacing: -0.02em;
    }
    .auth-title {
      font-family: var(--font-display); font-size: 1.5rem; font-weight: 700;
      color: var(--text-primary); margin-bottom: 6px; text-align: center;
    }
    .auth-subtitle {
      font-size: 0.875rem; color: var(--text-muted);
      text-align: center; margin-bottom: 24px; line-height: 1.5;
    }
    .google-btn {
      width: 100%; padding: 13px; background: var(--bg-card-hover);
      border: 1px solid var(--border-subtle); border-radius: var(--radius-md);
      color: var(--text-primary); font-size: 0.9rem; font-weight: 600;
      font-family: var(--font-display); cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.2s; text-decoration: none;
    }
    .google-btn:hover {
      background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.15); transform: translateY(-1px);
    }
    .google-icon { width: 20px; height: 20px; flex-shrink: 0; }
    .auth-divider {
      display: flex; align-items: center; gap: 12px; margin: 20px 0;
    }
    .auth-divider-line { flex: 1; height: 1px; background: var(--border-subtle); }
    .auth-divider-text { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
    .auth-form-group { margin-bottom: 14px; }
    .auth-label {
      display: block; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px;
      font-family: var(--font-display);
    }
    .auth-input {
      width: 100%; background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); padding: 12px 14px; color: var(--text-primary);
      font-size: 0.925rem; font-family: var(--font-body); outline: none;
      transition: all 0.2s; box-sizing: border-box;
    }
    .auth-input:focus {
      border-color: rgba(61,220,82,0.45); box-shadow: 0 0 0 3px rgba(61,220,82,0.1);
      background: var(--bg-card-hover);
    }
    .auth-input::placeholder { color: var(--text-muted); opacity: 0.6; }
    .auth-input.error { border-color: var(--error); }
    .password-wrap { position: relative; }
    .password-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 1rem; padding: 4px; transition: color 0.15s;
    }
    .password-toggle:hover { color: var(--accent); }

    /* Password strength */
    .pw-strength { margin-top: 6px; }
    .pw-strength-bar {
      height: 3px; background: var(--border-subtle); border-radius: 2px; overflow: hidden;
    }
    .pw-strength-fill {
      height: 100%; width: 0; border-radius: 2px; transition: all 0.3s;
    }
    .pw-strength-label { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }

    /* Terms */
    .terms-check {
      display: flex; align-items: flex-start; gap: 10px;
      margin: 16px 0; font-size: 0.82rem; color: var(--text-muted); line-height: 1.5;
    }
    .terms-check input[type="checkbox"] { margin-top: 2px; accent-color: var(--accent); }
    .terms-check a { color: var(--accent); text-decoration: none; }
    .terms-check a:hover { text-decoration: underline; }

    .auth-submit {
      width: 100%; padding: 14px; background: var(--accent); color: var(--text-primary);
      border: none; border-radius: var(--radius-md); font-size: 0.95rem; font-weight: 700;
      font-family: var(--font-display); cursor: pointer; transition: all 0.2s; letter-spacing: 0.03em;
    }
    .auth-submit:hover {
      background: #4aea61; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(61,220,82,0.3);
    }
    .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .auth-footer-text {
      text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--text-muted);
    }
    .auth-footer-text a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .auth-error {
      background: rgba(245,91,91,0.1); border: 1px solid rgba(245,91,91,0.25);
      border-radius: var(--radius-md); padding: 10px 14px; font-size: 0.82rem;
      color: var(--error); margin-bottom: 16px; display: none;
    }
    .auth-success {
      background: rgba(61,220,82,0.1); border: 1px solid rgba(61,220,82,0.25);
      border-radius: var(--radius-md); padding: 10px 14px;
      font-size: 0.82rem; color: var(--accent); margin-bottom: 16px; display: none;
    }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid var(--border-subtle); border-top-color: var(--border-default);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── OTP Fields ── */
    .otp-container { display: none; text-align: center; }
    .otp-group { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
    .otp-input {
      width: 45px; height: 50px; text-align: center; font-size: 1.2rem;
      font-family: var(--font-display); font-weight: 700;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); color: var(--text-primary); outline: none; transition: all 0.2s;
    }
    .otp-input:focus {
      border-color: rgba(61,220,82,0.45); box-shadow: 0 0 0 3px rgba(61,220,82,0.1);
      background: rgba(61,220,82,0.03); transform: translateY(-2px);
    }
    .back-btn {
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 0.85rem; display: inline-flex; align-items: center; gap: 6px;
      margin-top: 16px; transition: color 0.15s; font-family: var(--font-display);
    }
    .back-btn:hover { color: var(--text-primary); }
    .back-home {
      position: fixed; top: 20px; left: 24px; z-index: 10;
      display: flex; align-items: center; gap: 6px;
      font-size: 0.8rem; color: var(--text-muted); text-decoration: none;
      padding: 7px 14px; background: var(--bg-surface);
      border: 1px solid var(--border-subtle); border-radius: var(--radius-full); transition: all 0.2s;
    }
    .back-home:hover { color: var(--accent); border-color: rgba(61,220,82,0.3); }
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <a href="../../index.html" class="back-home">← Home</a>

  <div class="auth-bg">
    <div class="auth-bg-blob auth-bg-blob-1"></div>
    <div class="auth-bg-blob auth-bg-blob-2"></div>
    <div class="auth-grid-overlay"></div>
  </div>

  <div class="auth-page">
    <div class="auth-card">
      <a href="../../index.html" class="auth-logo">
        <div class="auth-logo-icon">Ru</div>
        <span class="auth-logo-text">RuPi</span>
      </a>

      <div class="auth-title">Create your account</div>
      <div class="auth-subtitle">Start managing your finances with AI — it's free to join</div>

      <div class="auth-error" id="authError"></div>
      <div class="auth-success" id="authSuccess"></div>

      <div id="auth-form-wrapper">
        <a id="googleSignupLink" href="/api/auth/google" class="btn btn-secondary" style="width:100%;justify-content:center;gap:10px;margin-bottom:var(--space-5);">
          <svg width="18" height="18" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z" fill="#FFC107"/>
            <path d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z" fill="#FF3D00"/>
            <path d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z" fill="#4CAF50"/>
            <path d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571l6.19 5.238C42.012 36.49 44 30.853 44 24c0-1.341-.138-2.65-.389-3.917z" fill="#1976D2"/>
          </svg>
          Continue with Google
        </a>

        <div class="auth-divider" style="margin-bottom:var(--space-5);"><span>or continue with email</span></div>
<form id="signupForm" novalidate>
<div class="form-row">
            <div class="auth-form-group">
              <label class="auth-label" for="firstName">First Name</label>
              <input class="auth-input" type="text" id="firstName" placeholder="Arjun" required autocomplete="given-name">
            </div>
            <div class="auth-form-group">
              <label class="auth-label" for="lastName">Last Name</label>
              <input class="auth-input" type="text" id="lastName" placeholder="Sharma" required autocomplete="family-name">
            </div>
          </div>

          <div class="auth-form-group">
            <label class="auth-label" for="email">Email Address</label>
            <input class="auth-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email">
          </div>

          <div class="auth-form-group">
            <label class="auth-label" for="password">Password</label>
            <div class="password-wrap">
              <input class="auth-input" type="password" id="password" placeholder="Min. 8 characters" required autocomplete="new-password">
              <button type="button" class="password-toggle" id="pwToggle">👁</button>
            </div>
            <div class="pw-strength">
              <div class="pw-strength-bar"><div class="pw-strength-fill" id="pwStrengthFill"></div></div>
              <div class="pw-strength-label" id="pwStrengthLabel"></div>
            </div>
          </div>

          <div class="auth-form-group">
            <label class="auth-label" for="confirmPassword">Confirm Password</label>
            <input class="auth-input" type="password" id="confirmPassword" placeholder="Repeat password" required autocomplete="new-password">
          </div>

          <div class="terms-check">
            <input type="checkbox" id="termsCheck" required>
            <label for="termsCheck">
              I agree to RuPi's <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>. I understand my financial data is encrypted and never sold.
            </label>
          </div>

          <button type="submit" class="auth-submit" id="signupBtn">Create Account</button>
        </form>

        <div class="auth-footer-text">
          Already have an account? <a href="login.html">Sign in</a>
        </div>
      </div>

      <!-- OTP Step -->
      <div id="otp-step" style="display:none;">
        <div style="text-align:center;margin-bottom:var(--space-6);">
          <div class="icon-wrap icon-wrap-lg" style="margin:0 auto var(--space-4);font-size:1.5rem;">🔐</div>
          <h2 style="font-size:1.4rem;margin-bottom:8px;">Verify your identity</h2>
          <p style="color:var(--text-muted);font-size:0.9rem;" id="otp-hint">
            A 6-digit code has been sent. Check the server terminal during demo.
          </p>
        </div>
        <div id="otp-error" style="display:none;padding:10px 14px;background:rgba(245,100,80,0.1);border:1px solid rgba(245,100,80,0.3);border-radius:8px;color:#f56450;font-size:0.85rem;margin-bottom:var(--space-4);"></div>
        <div style="display:flex;gap:10px;justify-content:center;margin-bottom:var(--space-5);">
          <input id="otp-input" type="text" maxlength="6" placeholder="000000"
            class="form-input"
            style="text-align:center;letter-spacing:0.4em;font-size:1.4rem;font-weight:700;max-width:200px;" />
        </div>
        <button id="otp-verify-btn" class="btn btn-primary" style="width:100%;justify-content:center;">
          Verify &amp; Continue
        </button>
        <button id="otp-resend-btn" class="btn btn-ghost btn-sm" style="width:100%;justify-content:center;margin-top:var(--space-3);color:var(--text-muted);">
          Resend code
        </button>
      </div>
  </div>

  <script>
    // Password toggle
    const pwToggle = document.getElementById('pwToggle');
    const pwInput = document.getElementById('password');
    pwToggle.addEventListener('click', () => {
      const isText = pwInput.type === 'text';
      pwInput.type = isText ? 'password' : 'text';
      pwToggle.textContent = isText ? '👁' : '🙈';
    });

    // Password strength
    const fill = document.getElementById('pwStrengthFill');
    const label = document.getElementById('pwStrengthLabel');
    pwInput.addEventListener('input', () => {
      const v = pwInput.value;
      let score = 0;
      if (v.length >= 8) score++;
      if (/[A-Z]/.test(v)) score++;
      if (/[0-9]/.test(v)) score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;
      const levels = [
        { w: '0%', c: 'transparent', t: '' },
        { w: '25%', c: '#f55b5b', t: 'Weak' },
        { w: '50%', c: '#f5b84c', t: 'Fair' },
        { w: '75%', c: '#5bc4f5', t: 'Good' },
        { w: '100%', c: '#3ddc52', t: 'Strong' }
      ];
      fill.style.width = levels[score].w;
      fill.style.background = levels[score].c;
      label.textContent = v ? levels[score].t : '';
      label.style.color = levels[score].c;
    });

    const API_BASE = window.RUPI_API_BASE || 'http://localhost:8000';
    const apiUrl = (path) => `${API_BASE}${path}`;
    let pendingAuthEmail = '';
    let pendingAuthToken = '';
    let pendingAuthUser = null;
    document.getElementById('googleSignupLink').href = apiUrl('/api/auth/google');

    function showOtpStep(email, token, user) {
      pendingAuthEmail = email;
      pendingAuthToken = token;
      pendingAuthUser = user;
      document.getElementById('auth-form-wrapper').style.display = 'none';
      document.getElementById('otp-step').style.display = 'block';

      fetch(apiUrl('/api/auth/send-otp'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
    }

    document.getElementById('signupForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch(apiUrl('/api/auth/register'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ firstName, lastName, email, password })
        });

        const data = await res.json();
        if (!res.ok) {
          alert(data.detail || data.message || 'Registration failed');
          return;
        }

        showOtpStep(email, data.token, data.user);
      } catch (err) {
        alert('Unable to connect to backend. Please try again.');
      }
    });

    document.getElementById('otp-verify-btn').addEventListener('click', async function() {
      const otp = document.getElementById('otp-input').value.trim();
      if (otp.length !== 6) {
        alert('Enter a 6-digit OTP');
        return;
      }

      const btn = document.getElementById('otp-verify-btn');
      btn.textContent = 'Verifying...';
      btn.disabled = true;

      try {
        const res = await fetch(apiUrl('/api/auth/verify-otp'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: pendingAuthEmail, otp })
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.detail || data.message || 'Invalid OTP');
          btn.textContent = 'Verify & Continue';
          btn.disabled = false;
          return;
        }

        localStorage.setItem('rupi_token', data.token || pendingAuthToken || '');
        localStorage.setItem('rupi_user', JSON.stringify(data.user || pendingAuthUser || {}));
        window.location.href = '../../index.html';
      } catch (err) {
        alert('Unable to verify OTP. Please try again.');
        btn.textContent = 'Verify & Continue';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
