<script>

// password toggle
const pwToggle = document.getElementById('pwToggle');
const pwInput = document.getElementById('password');

pwToggle.addEventListener('click', () => {
  const isText = pwInput.type === 'text';
  pwInput.type = isText ? 'password' : 'text';
  pwToggle.textContent = isText ? '👁' : '🙈';
});

let pendingAuthEmail = "";
const API_BASE = window.RUPI_API_BASE || 'http://127.0.0.1:8000';
const apiUrl = (path) => `${API_BASE}${path}`;


/* LOGIN SUBMIT */

document.getElementById("loginForm").addEventListener("submit", async function(e){

  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    alert("Enter email and password");
    return;
  }

  pendingAuthEmail = email;

  try{
    const res = await fetch(apiUrl("/api/auth/login"),{
      method:"POST",
      headers:{ "Content-Type":"application/json"},
      body: JSON.stringify({
        email: email,
        password: password
      })
    });

    const raw = await res.text();
    let data = {};
    try {
      data = raw ? JSON.parse(raw) : {};
    } catch (_) {
      data = { detail: raw };
    }

    if(!res.ok){
      alert(data.detail || data.message || "Login failed");
      return;
    }

    document.getElementById("auth-form-wrapper").style.display="none";
    document.getElementById("otp-step").style.display="block";
    alert(data.message || "OTP sent to your email.");
  } catch(err){
    alert("Unable to reach backend for OTP login.");
    return;
  }

});



/* OTP VERIFY */

document.getElementById("otp-verify-btn").addEventListener("click", async function(){

  const otp = document.getElementById("otp-input").value.trim();

  if(otp.length !== 6){
    alert("Enter a 6 digit OTP");
    return;
  }

  const btn = document.getElementById("otp-verify-btn");
  btn.textContent="Verifying...";
  btn.disabled=true;

  try{

    const res = await fetch(apiUrl("/api/auth/verify-otp"),{
      method:"POST",
      headers:{ "Content-Type":"application/json"},
      body: JSON.stringify({
        email: pendingAuthEmail,
        otp: otp
      })
    });

    const raw = await res.text();
    let data = {};
    try {
      data = raw ? JSON.parse(raw) : {};
    } catch (_) {
      data = { detail: raw };
    }

    if(res.ok){
      localStorage.setItem("rupi_token",data.token);
      localStorage.setItem("rupi_user",JSON.stringify(data.user));
      window.location.href="../../index.html";
      return;
    }

  } catch(err){
    alert("Unable to verify OTP right now. Please try again.");
    btn.disabled=false;
    btn.textContent="Verify & Continue";
    return;
  }

  alert("Invalid OTP");
  btn.disabled=false;
  btn.textContent="Verify & Continue";

});

</script>
