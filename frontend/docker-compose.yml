version: '3.9'

services:
  # ── Node.js Backend ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rupi-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/rupi
      - JWT_SECRET=${JWT_SECRET:-rupi-dev-jwt-secret-change-in-prod}
      - SESSION_SECRET=${SESSION_SECRET:-rupi-dev-session-secret}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-http://localhost:5000/api/auth/google/callback}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:5000}
    volumes:
      - ./uploads:/app/uploads          # Persist uploaded documents
      - .:/app                          # Live reload in dev (remove in prod)
      - /app/node_modules               # Don't override node_modules
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - rupi-network

  # ── MongoDB ──
  mongo:
    image: mongo:7.0
    container_name: rupi-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"                   # Expose so team devs can connect via Compass
    volumes:
      - mongo_data:/data/db            # Persist DB data across restarts
      - ./backend/config/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    environment:
      - MONGO_INITDB_DATABASE=rupi
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rupi-network

  # ── Mongo Express (DB GUI — dev only) ──
  mongo-express:
    image: mongo-express:1.0.2
    container_name: rupi-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=rupi2026
    depends_on:
      - mongo
    networks:
      - rupi-network
    profiles:
      - dev                             # Only starts with: docker compose --profile dev up

volumes:
  mongo_data:
    driver: local

networks:
  rupi-network:
    driver: bridge
